name: build-desktop

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt pyinstaller

      - name: Build desktop executable
        run: pyinstaller keiba-app.spec --noconfirm

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: keiba-kachisuji-${{ matrix.os }}
          path: dist/*

      - name: Create GitHub release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
